services:
  app:
    build: .
    container_name: ecommerce-react
    ports:
      - "5173:5173"
    volumes:
      - .:/app               # Espelhamento: o que você edita no VS Code muda no container
      - /app/node_modules    # Truque: usa os módulos do container, não do Windows
    environment:
      - CHOKIDAR_USEPOLLING=true # Ajuda o hot-reload funcionar melhor no Windows/WSL